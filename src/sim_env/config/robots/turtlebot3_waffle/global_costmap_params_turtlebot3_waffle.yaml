# map
global_frame: map
origin_z: 0.0
z_resolution: 1
z_voxels: 2
publish_voxel_map: false
transform_tolerance: 0.5
meter_scoring: true

# robot base
robot_base_frame: base_footprint
footprint: [[-0.21, -0.165], [-0.21, 0.165], [0.21, 0.165], [0.21, -0.165]]
footprint_padding: 0.01

update_frequency: 2.0
publish_frequency: 1.0
transform_tolerance: 0.5
cost_scaling_factor:  2.0
inflation_radius: 0.8 #0.8

### Sensor management parameters ###
obstacle_layer:
  observation_sources: scan
  scan: { 
    topic:                    scan, 
    sensor_frame:             base_footprint, 
    observation_persistence:  0.0,
    expected_update_rate:     0.8,
    data_type:                LaserScan, 
    clearing:                 true, 
    marking:                  true, 
    max_obstacle_height:      0.8,
    min_obstacle_height:      0.0,
    obstacle_range:           2.5,
    raytrace_range:           3.0,
    inf_is_valid:             true
  }  

### Social Layer - 行人社交舒适区域（RHCF 全局规划可选启用）###
social_layer:
  enabled: true
  ellipse_major: 2.5
  ellipse_minor: 1.0
  circle_radius: 0.8
  cutoff_distance: 3.0
  max_cost: 254
  publish_debug: false
  debug_topic: "social_layer/global_debug_costmap"

globalreachability_layer:
  enabled: true
  write_to_master: false
  # IMPORTANT: the built-in A* planner in this repo uses factor=0.5,
  # which treats cost >= 127 as (near) obstacle. Keep max_cost below that.
  max_cost: 80

  # Scheme-A reachability scoring (non-saturating, avoids huge areas = 1.0)
  # Prefer wider corridors in global planning: make width more influential.
  risk_clearance_scale_m: 0.40
  risk_width_scale_m: 1.50

  # 彩色热力图可视化（推荐）
  publish_color_cloud: false
  color_cloud_stride: 1
  color_cloud_z: 0.02

  # Map 可视化（类似 Voronoi/ESDF 的 OccupancyGrid）
  publish_grid: true

  # Smooth env field (reduce speckles/checkerboard). 0 disables.
  smooth_radius: 0

  # Skeleton / ridge structure (Voronoi/ESDF-like)
  enable_skeleton: true
  ridge_window_radius_cells: 2
  # Lower -> more ridge seeds (denser skeleton coverage)
  ridge_min_clearance_m: 0.08
  # Smaller -> thinner ridge influence band in the reachability heatmap
  ridge_attract_scale_m: 0.35
  alpha_ridge: 3.0
  # 0 -> keep skeleton thin (avoid turning a 1-cell ridge into a band)
  skeleton_seed_dilate_radius_cells: 0.0

  # Visualization-only mapping V(R): ONLY affects cloud/image coloring.
  # Planning/cost writing still uses raw reachability R.
  viz_mode: sigmoid              # raw | clamp | clamp_gamma | sigmoid
  viz_clamp_min: 0.00
  viz_clamp_max: 1.00
  viz_gamma: 1.50
  viz_sigmoid_k: 12.0
  viz_sigmoid_center: 0.55
  viz_esdf_scale_m: 1.0

  # unknown cells treatment (global usually conservative)
  treat_unknown_as_obstacle: true

  # geometry params (circle approximation)
  robot_radius: 0.27
  safety_distance_min: 0.05
  safety_distance_good: 0.25

  # width estimation
  max_raytrace_range_m: 6.0
  include_diagonal_rays: true
  adaptive_width: true

  # fusion weights
  alpha_clearance: 0.8
  alpha_width: 1.2

  # update rate (global env field can be low frequency / near-static)
  update_interval_s: 5.0

inflation_layer:
  enabled:              true
  cost_scaling_factor:  2.0  # exponential rate at which the obstacle cost drops off (default: 10)
  inflation_radius:     0.1  # max. distance from an obstacle at which costs are incurred for planning paths.

static_map:
  enabled:              true
  clear_time:           20
  publish_static_map:   true
    #params
